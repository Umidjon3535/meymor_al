services:
  - type: web
    name: al-meymor
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && python manage.py seed && gunicorn al_meymor.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.14"
      - key: DATABASE_URL
        fromDatabase:
          name: al-meymor-db
          property: connectionString

databases:
  - name: al-meymor-db
    plan: free
