{% extends 'core/base.html' %}
{% block content %}
<div class="auth-wrap">
  <div class="card">
    <div class="modal-head">
      <h3>Buyurtma: {{ category.icon }} {{ category.name }}</h3>
      <a href="{% url 'home' %}" class="close-btn">✕</a>
    </div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="field">
        <label>{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="error-text">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;">Buyurtma berish</button>
    </form>
  </div>
</div>
{% endblock %}
