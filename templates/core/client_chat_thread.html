{% extends 'core/base.html' %}
{% load static %}
{% block content %}
<div class="chat-page-wrap">
  <div class="chat-page-card">
    <div class="chat-page-head">
      <a href="{% url 'client_chat_list' %}" class="back-link">←</a>
      <div class="icon-circle">{{ order.category.icon }}</div>
      <div class="titles">
        <div class="t1">{{ order.category.name }}</div>
        <div class="t2">Admin bilan chat · {{ order.stage_label }}</div>
      </div>
    </div>
    <div class="chat-page-body" id="chatBox"></div>
    <div class="chat-page-input">
      <input type="text" id="chatInput" placeholder="Xabar yozing...">
      <button class="btn btn-primary" id="chatSendBtn">Yuborish</button>
    </div>
  </div>
</div>

<script src="{% static 'js/chat.js' %}"></script>
<script>
initChat({{ order.id }}, 'client', 'chatBox', 'chatInput', 'chatSendBtn', {
  messages: '{% url "chat_messages" order.id %}',
  send: '{% url "chat_send" order.id %}',
});
</script>
{% endblock %}
